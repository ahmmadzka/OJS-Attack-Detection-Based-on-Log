services:
  # nginx reverse proxy dan traffic mirror
  nginx:
    image: nginx:stable
    container_name: ojs-nginx
    ports:
      - "80:80"
    networks:
      - ojs-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mirror.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - ojs
      - extractor

  # ojs
  ojs:
    build:
      context: ./ojs
    container_name: ojs-app
    ports:
      - "127.0.0.1:8000:80"
    environment:
      OJS_CLI_INSTALL: "0"
      OJS_DB_HOST: postgres
      OJS_DB_DRIVER: pgsql
      OJS_DB_NAME: ${POSTGRES_DB}
      OJS_DB_USER: ${POSTGRES_USER}
      OJS_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./ojs/config.inc.php:/var/www/html/config.inc.php
      - ojs-files:/var/www/files
      - ojs-public:/var/www/html/public
    depends_on:
      - postgres
    networks:
      - ojs-network

  # Database PostgreSQL
  postgres:
    image: postgres:15
    container_name: ojs-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ojs-network

  # traffic extractor go/gin
  extractor:
    build:
      context: ./extractor
    container_name: traffic-extractor
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./extractor/requests.log:/app/requests.log
    networks:
      - ojs-network

  # prepare buat ml service maybee
  #
  # ml-service:
  #   build:
  #     context: ./ml-service
  #   container_name: ml-service
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
  #     - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
  #   networks: ojs-network

volumes:
  postgres-data:
  ojs-files:
  ojs-public:
  ojs-config:

networks:
  ojs-network:
    driver: bridge
