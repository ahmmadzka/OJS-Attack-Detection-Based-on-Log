server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=30s;

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # Lokasi utama: proxy ke OJS dan mirror ke extractor
    location / {
        # Mirror lalu lintas ke extractor (non-blocking)
        mirror /mirror;
        mirror_request_body on;

        # Reverse proxy ke aplikasi OJS
        proxy_pass http://ojs:80;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Endpoint internal mirror ke traffic-extractor
    location = /mirror {
        internal;

        proxy_pass http://extractor:8081$request_uri;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Original-Uri    $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header Content-Type      $content_type;
    }
}
